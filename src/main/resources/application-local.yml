# 로컬 개발 실행(./gradlew bootRun)용 H2 in-memory 데이터소스.
# MySQL 문법 호환을 위해 MODE=MySQL 사용. (Redis는 여전히 로컬에 기동되어 있어야 함)
spring:
  datasource:
    url: jdbc:h2:mem:ibid;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
