spring:
  application:
    name: ibid
  # 기본 프로파일은 local(H2). 배포 환경에서는 SPRING_PROFILES_ACTIVE 로 override.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  # Redis (refresh token store)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT (secrets must be >= 32 bytes for HS256; override via env in real environments)
jwt:
  access:
    secret: ${JWT_ACCESS_SECRET:local-access-secret-change-me-0123456789}
    expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh:
    secret: ${JWT_REFRESH_SECRET:local-refresh-secret-change-me-0123456789}
    expiration: ${JWT_REFRESH_EXPIRATION:1209600000}
